<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alerts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="api.js"></script>
    <script src="login.js"></script>
    <script>
        authGuard();
    </script>
    <script src="alert_list.js" defer></script>
    <script src="alert_details.js" defer></script>
    <script src="fraud_analysis.js" defer></script>
    <script src="customer_profile.js" defer></script>
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex align-items-center mb-3">
    <h4 class="mb-0">Alerts</h4>

        <div class="ms-auto d-flex gap-2">

            <button class="btn btn-primary btn-sm" data-view="pending">
                Pending
            </button>

            <button class="btn btn-outline-primary btn-sm" data-view="high_risk">
                High Risk
            </button>

            <button class="btn btn-outline-primary btn-sm" data-view="resolved">
                Resolved
            </button>

            <a href="transaction.html" class="btn btn-warning btn-sm">
                View Transactions
            </a>

            <a href="http://127.0.0.1:8000/admin/"
            target="_blank"
            class="btn btn-dark btn-sm">
                Admin
            </a>

        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Timestamp</th>
                        <th>Transaction</th>
                        <th>Amount</th>
                        <th>Location</th>
                        <th>Score</th>
                        <th>Level</th>
                        <th>Reason</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="alert_table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="txModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Alert Detail</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="alert-detail"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="fraudAnalysisModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" style="max-width:50vw">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Fraud Analysis</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="fraud-analysis-body"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
