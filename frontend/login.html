<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="width: 320px;">
        <div class="card-body">
            <h5 class="text-center mb-3">Staff Login</h5>

            <div class="mb-3">
                <input id="username"
                       class="form-control"
                       placeholder="Username">
            </div>

            <div class="mb-3">
                <input id="password"
                       type="password"
                       class="form-control"
                       placeholder="Password">
            </div>

            <button id="loginBtn" class="btn btn-primary w-100">
                Login
            </button>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script src="login.js"></script>
</body>
</html>
